name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      # LumenFlow operational files (WU specs, stamps, state, sessions)
      - 'docs/operations/tasks/wu/**'
      - 'docs/operations/tasks/backlog.md'
      - 'docs/operations/tasks/status.md'
      - '.lumenflow/stamps/**'
      - '.lumenflow/state/**'
      - '.lumenflow/sessions/**'
      - '.lumenflow/plans/**'
      - '.lumenflow/telemetry/**'
      - '.lumenflow/flow.log'
      - '.lumenflow/skip-gates-audit.log'
      # Documentation and markdown files
      - '*.md'
      - 'docs/**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/operations/tasks/wu/**'
      - 'docs/operations/tasks/backlog.md'
      - 'docs/operations/tasks/status.md'
      - '.lumenflow/stamps/**'
      - '.lumenflow/state/**'
      - '.lumenflow/sessions/**'
      - '.lumenflow/plans/**'
      - '.lumenflow/telemetry/**'
      - '.lumenflow/flow.log'
      - '.lumenflow/skip-gates-audit.log'
      - '*.md'
      - 'docs/**/*.md'

jobs:
  gates:
    name: Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install D2
        run: |
          curl -fsSL https://d2lang.com/install.sh | sh -s -- --prefix "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Strict progress
        run: pnpm strict:progress

      - name: Validate docs sync
        run: pnpm docs:validate

      - name: Audit docs truth and guide coverage
        run: pnpm docs:audit

      - name: Check template drift
        run: pnpm sync:templates --check-drift
