name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      # LumenFlow operational files (WU specs, stamps, state, sessions)
      - 'docs/operations/tasks/wu/**'
      - 'docs/operations/tasks/backlog.md'
      - 'docs/operations/tasks/status.md'
      - '.lumenflow/stamps/**'
      - '.lumenflow/state/**'
      - '.lumenflow/sessions/**'
      - '.lumenflow/plans/**'
      - '.lumenflow/telemetry/**'
      - '.lumenflow/flow.log'
      - '.lumenflow/skip-gates-audit.log'
      # Documentation and markdown files
      - '*.md'
      - 'docs/**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/operations/tasks/wu/**'
      - 'docs/operations/tasks/backlog.md'
      - 'docs/operations/tasks/status.md'
      - '.lumenflow/stamps/**'
      - '.lumenflow/state/**'
      - '.lumenflow/sessions/**'
      - '.lumenflow/plans/**'
      - '.lumenflow/telemetry/**'
      - '.lumenflow/flow.log'
      - '.lumenflow/skip-gates-audit.log'
      - '*.md'
      - 'docs/**/*.md'

jobs:
  gates:
    name: Gates
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Configure pnpm store
        run: echo "PNPM_STORE_DIR=$HOME/.local/share/pnpm/store/v10" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Strict progress
        run: pnpm strict:progress

      - name: Validate docs sync
        run: pnpm docs:validate

      - name: Audit docs truth and guide coverage
        run: pnpm docs:audit

      - name: Check template drift
        run: pnpm sync:templates --check-drift

  notify-failure:
    name: Notify Discord on Failure
    if: failure()
    runs-on: self-hosted
    needs:
      - gates
    steps:
      - name: Send Discord notification
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ CI Failed — lumenflow-dev\",
                \"description\": \"**Branch:** \`${{ github.ref_name }}\`\n**Commit:** \`${{ github.sha }}\`\n**[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})**\",
                \"color\": 15158332
              }]
            }"

  notify-success:
    name: Notify Discord on Success
    if: success() && github.event_name == 'push'
    runs-on: self-hosted
    needs:
      - gates
    steps:
      - name: Send Discord notification
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ CI Passed — lumenflow-dev\",
                \"description\": \"**Branch:** \`${{ github.ref_name }}\`\n**Commit:** \`${{ github.sha }}\`\n**[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})**\",
                \"color\": 3066993
              }]
            }"
