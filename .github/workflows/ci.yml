name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      # LumenFlow operational files (WU specs, stamps, state, sessions)
      - 'docs/operations/tasks/wu/**'
      - 'docs/operations/tasks/backlog.md'
      - 'docs/operations/tasks/status.md'
      - '.lumenflow/stamps/**'
      - '.lumenflow/state/**'
      - '.lumenflow/sessions/**'
      - '.lumenflow/plans/**'
      - '.lumenflow/telemetry/**'
      - '.lumenflow/flow.log'
      - '.lumenflow/skip-gates-audit.log'
      # Documentation and markdown files
      - '*.md'
      - 'docs/**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/operations/tasks/wu/**'
      - 'docs/operations/tasks/backlog.md'
      - 'docs/operations/tasks/status.md'
      - '.lumenflow/stamps/**'
      - '.lumenflow/state/**'
      - '.lumenflow/sessions/**'
      - '.lumenflow/plans/**'
      - '.lumenflow/telemetry/**'
      - '.lumenflow/flow.log'
      - '.lumenflow/skip-gates-audit.log'
      - '*.md'
      - 'docs/**/*.md'

jobs:
  gates:
    name: Gates
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Configure pnpm store
        run: echo "PNPM_STORE_DIR=$HOME/.local/share/pnpm/store/v10" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Strict progress
        run: pnpm strict:progress

      - name: Validate docs sync
        run: pnpm docs:validate

      - name: Audit docs truth and guide coverage
        run: pnpm docs:audit

      - name: Check template drift
        run: pnpm sync:templates --check-drift
