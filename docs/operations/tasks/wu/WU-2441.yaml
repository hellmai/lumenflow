description: 'Context: command and MCP example parity are now enforced, but YAML and config snippets
  can still drift silently from the live workspace and pack schemas. Problem: public and internal
  docs may continue to teach invalid config keys, retired shapes, or missing required structure
  while remaining syntactically plausible. Solution: extend docs parity validation to parse strict
  configuration examples, validate them against the live config schemas used by the docs/reference
  generation path, and document how strict versus illustrative config examples should be authored.'
acceptance:
  - Strict configuration examples fail when they use unknown keys, invalid shapes, or stale schema
    forms against the live config schemas.
  - Illustrative, historical, legacy, or placeholder configuration examples remain supported only
    when explicitly tagged and documented.
  - Docs authoring guidance explains how strict schema validation applies to YAML or JSON config
    examples.
