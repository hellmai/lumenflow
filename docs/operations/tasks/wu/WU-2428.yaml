description: 'Context: Published Starlight docs are live, but the pack sidebar omits published pack pages and the release surfaces still advertise v3.9.6 as latest. Problem: users cannot discover all published pack docs from navigation, and /releases plus the changelog contradict the actual published stable version 3.18.0. Solution: update docs site navigation, release index content, and changelog latest markers so the public site matches the published docs and release state.'
acceptance:
  - Packs sidebar includes the published Agent Runtime pack and routes to its overview/configuration/workflows pages.
  - Release index reflects 3.18.0 as the latest stable release and links to current release notes or changelog entries consistently.
  - Reference changelog latest marker and release metadata are updated to 3.18.0 and no longer claim v3.9.6 as latest.
  - Docs verification covers the updated navigation and release pages via docs build/gates.
