description: 'Consumer projects initialized before the pack system have packs: [] in workspace.yaml.
  pack:install --source local fails validation for the bundled software-delivery pack at
  node_modules/@lumenflow/cli/packs/software-delivery. This means config:set cannot resolve
  software_delivery as a valid root key, making all software_delivery.* config writes impossible.
  lumenflow init/upgrade should auto-register built-in packs.'
acceptance:
  - pack:install succeeds for bundled software-delivery pack from node_modules
  - lumenflow:upgrade on pre-pack projects auto-registers built-in packs
  - config:set --key software_delivery.* works after upgrade
