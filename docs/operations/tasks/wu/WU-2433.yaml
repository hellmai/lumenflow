description: 'Context: command references in docs are partially protected by CLI/MCP parity tests,
  but copy-paste command examples and workflow sequences across public/internal docs can drift while
  still building successfully. Problem: stale command names, outdated MCP tool identifiers, and
  invalid lifecycle ordering can remain in docs examples without failing CI. Solution: add a docs
  example parity validator that scans public and internal docs, classifies strict vs illustrative
  examples, validates CLI commands against the public manifest, validates MCP tools against the
  registry, and enforces workflow ordering rules for strict command examples.'
acceptance:
  - Docs example validator scans public and internal docs for CLI and MCP examples and fails on
    nonexistent commands or tools.
  - Strict workflow examples fail when mandatory lifecycle steps are missing or ordered incorrectly.
  - Illustrative examples can be explicitly tagged to bypass strict workflow validation while
    remaining discoverable and auditable.
  - Public and internal docs are updated to use the new example-tagging conventions where needed.
  - Targeted tests cover command extraction, MCP tool extraction, lifecycle validation, and
    allowlist behavior.
