description: "Context: Review of WU-2383 and WU-2384 found remaining contract gaps between the
  implemented safe-docs lifecycle and the documented ownership model. Problem: (1) lumenflow init
  still skips managed surfaces like LUMENFLOW.md and constraints.md in existing repos, so the
  canonical managed docs are never installed in the original problem case; reserved Claude skills
  also still respect init skip mode. (2) upgrade/docs:sync documents merge-block updates for vendor
  bootstrap files, but no upgrade sync path exists for CLAUDE.md, .cursor/rules/lumenflow.md,
  .windsurf/rules/lumenflow.md, or .clinerules. (3) lumenflow:upgrade still hardcodes
  vendor:'claude', so Claude skills are refreshed even for non-Claude installs, violating the new
  sync-only-managed-surfaces rule. (4) shipped CLI templates and bundled onboarding docs still tell
  users to run docs:sync --force after upgrade, leaving the generated product contract inconsistent.
  Solution: align init, docs-sync, upgrade, and shipped scaffold docs with the final ownership model
  from WU-2383; add tests that lock the contract for existing repos and non-Claude installs."
acceptance:
  - lumenflow init into a repo with an existing custom LUMENFLOW.md installs the managed LumenFlow
    guide according to the ownership model and preserves user-specific additions via the supported
    migration/override path rather than silently skipping the file
  - lumenflow init treats reserved LumenFlow skills consistently with the ownership model so managed
    skills are installed or refreshed while user-created skills remain untouched
  - upgrade/docs-sync updates shared vendor bootstrap files (CLAUDE.md, .cursor/rules/lumenflow.md,
    .windsurf/rules/lumenflow.md, .clinerules when present/configured) via merge-block markers
    instead of leaving them stale
  - lumenflow:upgrade does not hardcode Claude asset refresh for repos that do not use Claude;
    vendor/skill sync is limited to managed surfaces that exist or are configured
  - shipped CLI templates, bundled onboarding docs, and help/manifests no longer instruct users to
    run docs:sync --force after a normal upgrade when upgrade already syncs docs internally
  - 'tests cover the reviewed regressions: existing-repo init for managed docs, reserved-skill
    behavior on init/upgrade, vendor bootstrap refresh on upgrade, and non-Claude upgrade behavior'
