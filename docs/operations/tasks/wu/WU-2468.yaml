description: "Context: agents can hit lane/WIP claim failures and then try to mutate another claimed
  WU to free the lane. Problem: wu:block, wu:unblock, wu:release, and mutating wu:recover paths do
  not enforce active-session ownership, so tooling can target another agent's WU. Solution: add CLI
  ownership guards for state-mutating commands and update claim failure guidance so the tool
  explicitly tells agents not to free lanes by touching another WU."
acceptance:
  - State-mutating WU commands refuse to act on another WU when the active session belongs to a
    different WU or the target WU is claimed by another session.
  - Any manual cross-owner recovery requires explicit override intent with a reason.
  - wu:claim lane/WIP failures explicitly tell agents not to use wu:block, wu:release, wu:recover,
    or wu:unblock on another agent's WU to free the lane.
  - Focused regression tests cover the new ownership guard and claim guidance wiring.
