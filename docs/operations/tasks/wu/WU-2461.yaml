description: 'Context: wu:done performs a non-blocking inbox check for recent parallel-agent signals during completion. Problem: if the memory signal store still contains legacy records that predate the strict signal contract, loadSignals throws and wu:done emits a noisy warning about unsupported legacy signal records. Completion continues, but the inbox telemetry becomes unreliable and the user sees a recoverable data-compatibility failure during unrelated WU completion. Solution: make the wu:done inbox path tolerate or skip legacy signal records gracefully, or migrate/filter them in the read path, so non-blocking telemetry stays non-blocking and non-noisy.'
acceptance:
  - wu:done does not emit a legacy-signal warning during inbox checks when historical signal records use the pre-strict schema
  - Strict signal validation is preserved for workflows that truly require strict records; the graceful path is limited to non-blocking inbox telemetry or an equivalent compatibility layer
  - Regression tests cover legacy signal records in the wu:done inbox-check path
