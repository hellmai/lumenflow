description: 'Context: WU-2446 added guidance_ref support for co-change rules so projects can attach
  detailed test-quality guidance files. Problem: the current implementation only resolves
  guidance_ref during co-change gate execution, so agents do not see the project-specific guidance
  in wu:brief/spawn prompts before writing tests. This leaves the original downstream UX only
  partially solved and conflicts with the WU-2446 description. Solution: load configured co-change
  rules during prompt assembly, resolve any guidance_ref content safely, and surface matching
  project-specific guidance in wu:brief/spawn prompts for relevant WUs before gates run.'
acceptance:
  - wu:brief / spawn prompt assembly resolves guidance_ref content for matching co-change rules and
    includes it in the prompt before implementation begins
  - Prompt injection is scoped to relevant WUs based on changed/code paths and does not add
    unrelated guidance to non-matching prompts
  - Missing guidance_ref files emit a non-fatal warning or are skipped cleanly during prompt
    assembly, matching gate-time resilience
  - Regression tests cover matching-rule injection, non-matching WUs, and missing-file behavior
