description: 'Context: docs-only and maintenance WUs can hit pre-existing @lumenflow/cli test
  failures on clean main during wu:prep, but current pre-existing detection only checks spec:linter.
  Problem: operators get blocked without the audited skip-gates guidance that the onboarding docs
  imply. Solution: extend wu:prep pre-existing failure handling so worktree prep can distinguish new
  test failures from main-pre-existing test failures and print the ready wu:done --skip-gates
  command when the blocker is not introduced by the current WU.'
acceptance:
  - wu:prep prints a ready wu:done --skip-gates --reason --fix-wu command when gates fail only
    because tests already fail on clean main
  - New test failures introduced by the current WU remain blocking and do not emit pre-existing skip
    guidance
  - Automated coverage locks the pre-existing-test-failure guidance path for wu:prep
