description: "Context: Co-change rules in workspace.yaml can enforce that trigger file changes require companion files (e.g., page changes require E2E specs). The guidance field is an inline string limited to one sentence. Problem: Projects cannot reference a detailed style guide file, so agents see unhelpful guidance like 'Dashboard page changes should have a Playwright E2E spec' with no quality criteria. This causes agents to satisfy the gate with brittle assertions. Solution: Add an optional guidance_ref field to CoChangeRuleConfigSchema that references a file path. When present, the gate runner reads the file and appends its content alongside the inline guidance. The spawn prompt builder should also inject referenced guidance into the brief."
acceptance:
  - CoChangeRuleConfigSchema in gates-section-config.ts accepts an optional guidance_ref string field
  - Gate runner in gates-runners.ts reads the referenced file and appends its content to the violation message when guidance_ref is set
  - gate:co-change CLI supports --guidance-ref in add and edit subcommands
  - When guidance_ref file does not exist, gate runner emits a warning but does not fail
  - Existing inline guidance field continues to work unchanged (backward compatible)
