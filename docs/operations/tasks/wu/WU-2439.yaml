description: 'Context: MCP docs now validate tool names and generated reference drift, but payload
  examples can still silently diverge from live tool schemas. Problem: stale or incomplete MCP
  example arguments in public and internal docs can remain plausible while teaching invalid tool
  usage. Solution: extend docs parity validation to parse MCP payload examples, validate strict
  examples against the live MCP registry and tool schemas, and document the tagging/allowlist rules
  for illustrative or historical examples.'
acceptance:
  - Strict MCP examples fail when they reference unknown tools, omit required fields, or provide
    invalid payload shapes against live tool schemas.
  - Illustrative, historical, legacy, or placeholder MCP examples remain supported only when
    explicitly tagged and documented.
  - Docs authoring guidance explains how to mark MCP examples as strict versus illustrative and how
    schema validation is applied.
