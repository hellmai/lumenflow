description: "Context: wu:edit supports editing most WU spec fields (description, acceptance, notes, lane, type, priority, etc.) but is missing the --title flag. Agents attempting to update a WU title via wu:edit get 'error: unknown option --title' and must fall back to --spec-file workarounds. Solution: Add --title <text> option to wu:edit following the same pattern as --description (simple string replacement). Include in hasEdits check, ApplyEditsOpts, applyEdits(), and block title changes on done WUs."
acceptance:
  - wu:edit --id WU-XXX --title 'New title' updates the title field
  - Title changes blocked on done WUs with clear error message
  - --help output includes --title
