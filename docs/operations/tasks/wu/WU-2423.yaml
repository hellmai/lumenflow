  title via wu:edit get 'error: unknown option --title' and must fall back to --spec-file
  workarounds. Solution: Add --title <text> option to wu:edit following the same pattern as
  --description (simple string replacement). Include in hasEdits check, ApplyEditsOpts,
  applyEdits(), and block title changes on done WUs."
