description: 'Context: A real consumer-repo upgrade from @lumenflow 3.16.1 to 3.17.0 showed that the
  safe-docs ownership model prevents data loss, but the migration experience is still rough in
  legacy repos. Problem: (1) legacy unmarked AGENTS.md and CLAUDE.md are preserved verbatim and then
  get a managed merge-block appended, leaving duplicate bootstrap content instead of a clean
  converted file; (2) LUMENFLOW.md drift detection backs up entire prior managed templates into
  LUMENFLOW.local.md even when the file is just an older scaffolded LumenFlow guide, creating noisy
  false-local overrides; (3) scaffolded onboarding docs like quick-ref-commands.md remain stale
  after upgrade because docs-sync still skips existing onboarding files, so consumer repos can keep
  obsolete docs:sync --force guidance even after package upgrade. Solution: refine upgrade/docs-sync
  migration behavior so older scaffolded managed/bootstrap docs are recognized and converted
  cleanly, only true user-local workflow additions become LUMENFLOW.local.md, and shipped onboarding
  docs that are LumenFlow-managed are refreshed on upgrade without clobbering genuine user-authored
  content.'
acceptance:
  - Upgrading a repo with a legacy scaffolded AGENTS.md converts it to the current bootstrap format
    without duplicating the old full file above the managed block, while preserving genuine
    user-authored content outside the managed section
  - Upgrading a repo with a legacy scaffolded CLAUDE.md converts it to the current bootstrap format
    without duplicate bootstrap content, while preserving genuine user-authored content outside the
    managed section
  - Upgrading a repo whose pre-3.17 LUMENFLOW.md is just an older LumenFlow-managed template does
    not create a noisy full-copy LUMENFLOW.local.md backup; LUMENFLOW.local.md is created only when
    real local additions need preservation
  - Scaffolded onboarding docs that are part of the shipped LumenFlow contract, including
    quick-ref-commands.md, are refreshed to current upgrade guidance during lumenflow:upgrade, so
    stale docs:sync --force instructions are not left behind in consumer repos
  - The migration logic distinguishes older scaffolded content from genuinely user-maintained
    content for managed docs and bootstrap docs, with regression tests covering AGENTS.md,
    CLAUDE.md, LUMENFLOW.md, and onboarding-doc upgrade behavior
