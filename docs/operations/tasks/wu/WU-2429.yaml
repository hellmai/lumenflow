description: 'Context: public Starlight docs, internal onboarding docs, and MCP reference surfaces
  can drift from the actual CLI/MCP implementation, and the public site still lacks Sidekick pack
  docs. Problem: users and agents may see stale command counts, stale MCP architecture details,
  missing public pack coverage, and outdated examples/links across the docs site. Solution: audit
  the CLI command surface against Starlight and internal docs, update MCP and pack docs to match the
  current implementation, add proper public Sidekick documentation and navigation, and verify
  examples/links across affected docs areas.'
acceptance:
  - Public Starlight command and MCP reference surfaces are aligned with the current CLI command
    manifest and MCP implementation, with documented intentional scope differences where applicable.
  - Public Sidekick pack docs exist under the Starlight packs IA and are linked from site navigation
    alongside other published packs.
  - Internal docs that describe CLI command discovery, MCP architecture, or public docs behavior are
    updated where they currently contradict the implementation or published site.
  - Docs examples and links across affected public pages are reviewed and corrected where stale or
    broken, and docs verification covers the updated surfaces.
