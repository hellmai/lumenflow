description: 'Context: LumenFlow spawn guidance tells agents to prefer user-outcome verification over brittle DOM assertions, but the wording is too abstract. Downstream agents still write tests asserting exact copy, inline styles, and CSS hues because nothing names those as the exact anti-patterns to avoid. Problem: The guidance appears in four places (template, generator x3) and two test files lock the wording. A partial update will drift. Solution: Add a concrete anti-patterns subsection to visual-directive.md, mirror it in generateSmokeTestGuidance(), tighten the one-liners in generateMandatoryStandards() and generateEnforcementSummary(), and update the regression tests that lock the old wording.'
acceptance:
  - 'visual-directive.md contains a new Anti-Patterns subsection naming: inline style values, CSS hue/color numbers, exact marketing copy, substring label matches, DOM shape snapshots'
  - generateSmokeTestGuidance() mirrors the same anti-patterns list from the template
  - generateMandatoryStandards() smoke-test bullet references anti-patterns, not just prefer user-outcome
  - generateEnforcementSummary() smoke-test line references behavioral verification with anti-pattern awareness
  - wu-spawn.test.ts and wu-spawn-prompt-builders.test.ts assertions updated to match new wording and pass
  - All four guidance sites use consistent language (no drift between template and generator)
