description: 'Context: docs parity now validates CLI command names and workflow ordering, but
  examples can still show stale or unsupported flags. Problem: guide and onboarding snippets may
  continue to look valid while teaching incorrect flag usage. Solution: extend docs parity
  validation to parse strict CLI examples, verify flags and option forms against the live public CLI
  manifest/help surface, and document authoring rules for strict versus illustrative CLI examples.'
acceptance:
  - Strict CLI examples fail when they reference unknown flags, retired option names, or invalid
    option forms for the documented command.
  - Illustrative, historical, legacy, or placeholder CLI examples remain supported only when
    explicitly tagged and documented.
  - Docs authoring guidance explains how strict CLI example validation works for commands and flags.
