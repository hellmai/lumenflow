description: 'Context: docs parity is stronger after WU-2435, but the MCP reference remains curated
  rather than generated, command-policy guidance between pnpm and npx is still inconsistent, and
  example validation does not yet check MCP payload shapes. Problem: docs can still drift in
  high-value reference and setup surfaces even when command-name parity passes. Solution: generate
  the MCP reference from the live registry, document a clear command policy for repo-local versus
  external-project examples, and extend docs validation to cover the richer example surface.'
acceptance:
  - Generate the public MCP reference from the live MCP registry so tool inventory and tool sections
    stay synchronized with code.
  - Document and apply a clear command policy for repo-local examples versus external-project setup
    examples across public and internal docs.
  - Extend docs/example validation to cover the newly generated MCP reference and selected
    MCP/example payload structure where practical.
  - Keep historical and compatibility content explicitly excluded rather than weakening parity
    checks for live docs.
