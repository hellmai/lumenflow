description: 'WU-2395 was wrong. It removed YAML files from prettier targets assuming yaml.stringify produced prettier-compatible output. It does not — prettier has built-in YAML support and formats differently than yaml.stringify (different quoting, wrapping). Result: WU YAML files are now committed unformatted, failing consumer CI format:check. Fix: after writeWU writes the YAML file, reformat it using prettier Node.js API (prettier.format with parser:yaml and resolved consumer config), so output exactly matches what prettier --check expects. This replaces both the yaml.stringify approach and the brittle pnpm prettier shell-out.'
acceptance:
  - WU YAML files committed by wu:done pass prettier --check in a consumer project
  - backlog.md and status.md continue to pass prettier --check
  - Formatting works regardless of whether consumer has a prettier script in package.json
