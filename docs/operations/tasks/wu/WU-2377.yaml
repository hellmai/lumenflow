description: 'Context: generic defaults and incremental gate planning still assume monorepo root
  prefixes such as apps/, packages/, tools/, plus a default apps/web working directory. Problem:
  repos that do not match the monorepo-web layout can get skipped or misclassified in format, lint,
  or docs-only planning, even when the underlying workflow should remain generic. Solution: make
  directory defaults and gate-planning heuristics derive from configured directories or detected
  repo shape instead of fixed root-prefix assumptions.'
acceptance:
  - Generic directory defaults no longer require apps/web as the implicit working-directory
    assumption for non-web consumer repos
  - Incremental format/lint/docs-only planning no longer depends solely on apps/, packages/, or
    tools/ prefixes and works for non-monorepo repo shapes
  - Automated tests cover at least one single-package layout and one non-web monorepo layout
