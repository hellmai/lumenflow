description: 'Context: wu:done requires fresh wu:brief evidence for bug/feature WUs, and wu:brief
  records that evidence in .lumenflow/state/wu-events.jsonl. Problem: when parallel completions
  trigger wu:done auto-rebase, the rebase path refuses to proceed if the only dirty file is
  workflow-generated wu-events.jsonl state from a fresh wu:brief run. This creates a completion
  loop: regenerate required evidence, then fail rebase because the evidence dirtied the worktree.
  Solution: treat workflow-generated wu:brief/state-only drift as safe during the auto-rebase path,
  or preserve/absorb it automatically so completion can proceed without manual stash/commit
  workarounds.'
acceptance:
  - wu:done auto-rebase does not fail when the only dirty worktree change is fresh wu:brief/state
    evidence in .lumenflow/state/wu-events.jsonl
  - Non-state source edits still block auto-rebase and continue to require explicit user/agent action
  - Regression tests cover the required-evidence plus parallel-completion path so wu:brief and
    auto-rebase no longer deadlock each other
