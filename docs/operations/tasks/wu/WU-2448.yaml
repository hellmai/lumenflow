description: "Context: The co-change gate checks file pairings (if you changed X, you must also
  change Y) but cannot run a verification command. Projects need scoped enforcement like 'if the WU
  touches DB files, run db:verify' without slowing every WU. Problem: Today gates either run
  globally (migration_verify in gates.commands) or not at all. There is no way to trigger a command
  conditionally based on changed file patterns. This forces projects to either run expensive checks
  on every WU or skip them entirely. Solution: Add a conditional_commands section to gates config.
  Each entry has trigger_patterns (glob), a command to run, severity (warn/error/off), and optional
  guidance. The gates runner checks changed files against trigger_patterns and only runs the command
  when matched."
acceptance:
  - Gates config schema accepts a conditional_commands array with trigger_patterns, command,
    severity, and optional guidance/guidance_ref fields
  - Gates runner evaluates trigger_patterns against changed files and only runs matched commands
  - Unmatched conditional commands are skipped silently (no slowdown for unrelated WUs)
  - 'Command failure respects severity: error blocks gates, warn logs and continues'
  - gate:co-change CLI or a new gate:conditional CLI supports add/edit/remove/list for conditional
    commands
