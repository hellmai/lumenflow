description: 'initiative:edit loads the initiative YAML from local main (loadInitiative at line
  656), applies edits in-memory, then writes the result into a micro-worktree checked out from
  origin/main. If local main is behind origin (ensureMainUpToDate was removed in WU-1497), any
  fields added to origin since last pull (e.g. wus: list from initiative:add-wu) are silently
  dropped. Fix: re-read initiative from micro-worktree path inside execute callback.'
acceptance:
  - 'Failing test demonstrates wus: dropped when local is stale'
