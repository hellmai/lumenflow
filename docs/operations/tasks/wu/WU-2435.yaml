description: 'Context: the current docs example parity guard covers public docs and a narrow LumenFlow onboarding subset. Problem: stale CLI and MCP examples can still drift in the wider internal operations docs and in inline/table examples without being caught. Solution: broaden scanning to docs/operations/**, keep tag-gated enforcement, add broader stale-command detection, and update docs authoring guidance so strict versus illustrative examples are explicit.'
acceptance:
  - Broaden docs example parity scanning to include docs/operations/** with explicit historical/compatibility allowlists.
  - Validate CLI commands in inline, callout, and table-style examples where they are clearly command usage, while keeping tag-gated workflow enforcement.
  - Validate MCP tool examples across the expanded doc scope and fail on unknown tools outside allowed historical/compatibility sections.
  - Document example tagging conventions and when strict versus illustrative tags are required.
