description: 'Context: wu:edit calls validateWorktreeClean unconditionally (WU-1365), which blocks
  all edits when the worktree has uncommitted changes. Problem: agents need to fill metadata fields
  (notes, acceptance criteria) mid-implementation to satisfy wu:validate and pnpm gates, but cannot
  because their implementation changes make the worktree dirty. This forces agents to either commit
  incomplete work or raw-edit WU YAML directly, violating Constraint 9 (safe YAML modification).
  Solution: skip the dirty-worktree check for metadata-only fields (notes, acceptance, risks,
  escalation_triggers) that do not conflict with source file changes.'
acceptance:
  - wu:edit --notes and wu:edit --acceptance succeed on dirty worktrees without requiring a prior
    commit
  - wu:edit for fields that touch code_paths or structural WU fields still enforces the
    clean-worktree check
  - Regression test covers the metadata-only bypass path
