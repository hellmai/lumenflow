description: 'Context: Claude Code (and potentially other IDE agents) truncate long Bash tool stdout
  at a hardcoded limit. wu:brief produces output that exceeds this limit, so agents never receive
  the full context prompt. Problem: Agents start WU implementation with truncated context — missing
  constraints, acceptance criteria, TDD directives, or the LUMENFLOW_SPAWN_END sentinel. This
  defeats the purpose of wu:brief entirely. Solution: Write full wu:brief output to
  .logs/wu-brief-WU-XXX.md and print a recovery header to stdout. Truncation cuts from the end, so
  the file path on line 1 always survives. Every vendor (Claude Code, Windsurf, Cursor, Codex) can
  read files — this is vendor-agnostic.'
acceptance:
  - wu:brief writes full output to .logs/wu-brief-{wuId}.md
  - wu:brief prints file path and recovery hint as first two lines of stdout
  - wu:brief still prints full prompt to stdout after the header (backward compat)
  - wu:delegate uses the same file output path (shares runBriefLogic)
  - .logs/ directory created if missing (mkdirSync recursive)
  - File uses no timestamp — overwrites on re-run (one canonical output per WU)
