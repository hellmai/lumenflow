description: "Context: wu:done enforces claim-session ownership to stop one agent from completing
  another agent's WU. Problem: after a legitimate claim, prep, and rebase flow, wu:done can still
  fail with CLAIM OWNERSHIP VIOLATION when the claimed session is recorded but the current
  environment has no active session attached (reported as Active session: none). This forces --force
  orphan-recovery usage even when the same operator is simply resuming completion in a new
  shell/session. Solution: distinguish missing active-session context from a true conflicting active
  session, and provide a safe non-force continuation path for legitimate same-WU completion
  resumes."
acceptance:
  - wu:done does not raise CLAIM OWNERSHIP VIOLATION solely because active session context is
    missing while the WU remains legitimately claimed and otherwise valid for completion
  - True cross-session conflicts with a different active session still block completion unless an
    audited override is used
  - Unit tests cover missing-active-session, matching-session, and conflicting-session ownership
    outcomes
