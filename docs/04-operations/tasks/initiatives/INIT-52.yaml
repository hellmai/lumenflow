success_metrics:
  - ADR defines the agent-runtime architecture boundary, task model, and orchestration cut-line.
  - Kernel runtime supports resolved pack config, manifest-level env allowlisting, and
    policy_factory-based intent gating.
  - agent-runtime pack provides governed model-turn execution with provider-neutral adapters and
