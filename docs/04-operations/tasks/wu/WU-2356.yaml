description: 'Context: WU-2355 tightened sizing guidance in the core onboarding docs, and a follow-up review found residual drift in root and template entrypoints. Problem: LUMENFLOW.md and template copies still carry oversplitting guidance, including time-based initiative cues and a false binary for sizing advisories, so fresh scaffolds can regress the sizing contract. Solution: align the root and template docs with the one-coherent-outcome rule, remove time-based split language, and verify docs/template sync is clean before release.'
acceptance:
  - LUMENFLOW.md and its template describe initiative use in terms of multiple independently completable WUs, lane ownership, or staged rollout, not file-count shorthand alone.
  - Starting-prompt source and template contain no time-based initiative split cues and use the same one-coherent-outcome guidance.
  - first-wu-mistakes template advises stronger single-WU strategies before splitting oversized work.
  - Docs/template validation passes so release proceeds from aligned guidance.
