description: |-
  Context: LumenFlow already has high-risk gate routing and configurable co-change rules, including schema-to-migration enforcement examples.
  Problem: database and schema work still slips through without required migrations or companion verification, and the omission is often discovered later rather than during the WU lifecycle.
  Solution: Add stronger default safeguards for database-affecting WUs so schema changes require migration companions, missing co-changes fail with actionable guidance, and the workflow surfaces the correct verification expectations for DB-risk work before completion.
acceptance:
  - Default co-change or equivalent gate enforcement fails when database schema changes land without required migration companions
  - Gate output for missing database co-changes is actionable and points the agent toward the required companion artifacts
  - Database-affecting and migration-risk work surface the correct verification expectations instead of relying on ad hoc unit tests
  - Existing configurable co-change support remains backwards compatible for repos with custom patterns
  - Regression tests cover trigger and require pattern enforcement plus DB-risk verification routing
