description: "Context: wu:edit uses .flatMap(p => p.split(',')) on all repeatable fields including
  free-text ones like --test-paths-manual and --risks. Problem: manual test descriptions containing
  natural commas get split into broken fragments. Root cause: WU-1870 added comma-splitting for path
  shorthand but applied it indiscriminately to free-text fields. Solution: stop splitting on commas
  for free-text fields while keeping comma-splitting for path/ID fields."
acceptance:
  - Free-text fields (test-paths-manual and risks) passed to wu:edit preserve commas in their values
    instead of splitting on them
  - Path/ID fields (code-paths and test-paths-unit and test-paths-e2e and blocked-by and add-dep)
    continue to support comma-separated shorthand
  - Existing tests pass and new tests cover comma-containing free-text values
