title: Fix cloud/branch-pr completion to be fail-closed and self-consistent
lane: 'Framework: CLI WU Commands'
type: bug
status: ready
priority: P1
created: 2026-03-11
code_paths:
  - packages/@lumenflow/core/src/wu-done-pr.ts
  - packages/@lumenflow/core/src/wu-done-branch-only.ts
  - packages/@lumenflow/core/src/wu-done-merge-phase.ts
  - packages/@lumenflow/core/src/wu-done-worktree-services.ts
