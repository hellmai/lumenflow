description: wu:done branch-pr was fail-open when gh is unavailable (reported success without creating a PR). wu:prep gave contradictory guidance telling users to manually create PRs instead of letting wu:done handle it. wu:claim had inconsistent messaging. Also missing cloud/branch-pr troubleshooting doc parity.
acceptance:
  - wu:done branch-pr fails closed when gh is unavailable or PR creation returns no URL
  - wu:prep always directs branch-pr users to wu:done, never to manual gh pr create
  - wu:claim branch-pr messaging is consistent with the above
  - Troubleshooting docs cover cloud/branch-pr path with parity to worktree docs
