description: 'Context: WU-2146 added optional signal metadata fields with explicit backward-compatibility framing. Problem: this bakes compatibility behavior into active code paths and dilutes strict contract enforcement. Solution: supersede WU-2146 by moving to a strict signal contract with explicit required fields where needed, removing compatibility language and fallback handling from signal schema/read-write flow, and adding deterministic migration handling for pre-existing records instead of silent compatibility.'
acceptance:
  - WU-2146 compatibility framing is superseded and recorded in this WU notes
  - Signal schema and memory signal write/read path enforce strict contract; no silent backward-compatible fallback path remains
  - Legacy signal records are handled via explicit migration/repair step (or explicit failure), not implicit permissive parsing
  - Unit tests cover strict validation behavior and legacy-record handling behavior
  - pnpm gates passes
