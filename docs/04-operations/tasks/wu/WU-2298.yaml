description: 'Context: release micro-worktree runs pnpm install --frozen-lockfile and fails because pnpm-lock.yaml importer for @lumenflow/control-plane-sdk still lists @lumenflow/kernel despite package.json removal. Problem: this blocks lumenflow:release before version bump/publish. Solution: regenerate lockfile to remove stale importer dependency and verify frozen install passes.'
