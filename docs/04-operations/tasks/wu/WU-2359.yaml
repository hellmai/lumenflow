description: 'Gate pressure from wu:done teaches agents to use wu:brief --evidence-only, which satisfies bookkeeping while withholding guidance. Spawn provenance hard-blocks non-orchestrated initiative WUs requiring --force. Fix: (1) remove --evidence-only flag so wu:brief always gives full context, (2) make spawn provenance warn-only for non-spawned WUs, (3) update internal docs and Starlight.'
acceptance:
  - wu:brief --evidence-only is removed or errors with migration guidance
  - wu:brief always outputs full WU context and records evidence
  - spawn provenance warns (not blocks) for WUs without delegation registry entry
  - spawn provenance still hard-blocks when WU was explicitly spawned/delegated
  - onboarding docs and Starlight reference docs updated to reflect changes
  - all existing tests pass; new tests cover warn-vs-block behavior
