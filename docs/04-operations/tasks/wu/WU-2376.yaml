description: 'Context: generic lifecycle paths still hardcode package-manager and workspace-tool
  commands, even though LumenFlow already models configurable package managers and should not assume
  Turborepo or pnpm in consumer repos. Problem: missing-workspace guidance and docs regeneration
  currently emit pnpm-specific or turbo-specific commands in core and CLI surfaces, which breaks the
  portability baseline for non-pnpm or non-turbo consumer repos. Solution: introduce shared portable
  command rendering/execution for generic lifecycle paths and replace hardcoded workspace-init and
  docs:generate literals where those commands are meant to be config- or capability-driven.'
acceptance:
  - Generic workspace-init guidance in core and CLI surfaces no longer hardcodes pnpm and instead
    renders the configured or portable bootstrap command consistently
  - wu:done documentation regeneration no longer hardcodes 'pnpm turbo docs:generate' when a
    resolved docs generation command is available
  - Automated tests cover both the portable guidance path and docs-generate execution path
