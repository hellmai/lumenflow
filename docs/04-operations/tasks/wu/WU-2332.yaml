description: 'Context: Upgraded consumer repos can end up with workspace.yaml as the authoritative lane source while .lumenflow.lane-inference.yaml still contains older taxonomy. Problem: lane:create/lane:edit/lane:validate surface drift but only point users at lane:suggest, which is still heuristic-only and cannot reliably restore existing lane taxonomy. Solution: add a deterministic workspace-to-inference reconciliation path, use it in lane tooling, and update docs/tests so upgrade recovery no longer depends on lane:suggest heuristics.'
acceptance:
  - There is a deterministic command or workflow to regenerate .lumenflow.lane-inference.yaml from workspace.yaml lane definitions.
  - lane:create and lane:edit keep workspace.yaml and .lumenflow.lane-inference.yaml aligned instead of failing on recoverable drift.
  - Drift remediation guidance points to deterministic reconciliation rather than lane:suggest heuristics.
  - CLI tests cover drift reconciliation and upgrade-recovery behavior.
