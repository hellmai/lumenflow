description: docs:sync currently only refreshes scaffolded onboarding docs and Claude skills. It
  does not refresh LUMENFLOW.md, AGENTS.md, CLAUDE.md, or .lumenflow/constraints.md — those are
  init-only scaffolds. lumenflow:upgrade does not call docs:sync or warn about stale docs. Consumers
  who upgrade packages never get updated core workflow docs. Add core docs (LUMENFLOW.md, AGENTS.md,
  constraints.md) to docs:sync scope. Add a post-upgrade staleness check to lumenflow:upgrade that
  compares template hashes and prints a warning with copy-paste command if docs are stale.
acceptance:
  - docs:sync --force refreshes LUMENFLOW.md, AGENTS.md, and .lumenflow/constraints.md from their
    templates
  - docs:sync default (no --force) skips existing core docs same as onboarding docs
  - lumenflow:upgrade prints staleness warning after package update if any synced docs are out of
    date
  - 'Warning includes copy-paste command: pnpm docs:sync --force'
  - Existing onboarding and skills sync behavior unchanged
  - Doc surfaces describing docs:sync scope updated (public-manifest.ts, quick-ref-commands,
    starting-prompt, UPGRADING template)
  - sync-templates.ts core docs drift check updated to include AGENTS.md
