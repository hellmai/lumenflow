notes: Depends on WU-2365 (centralized startup guidance) to establish the template content worth syncing. Vendor overlay files (CLAUDE.md, .cursor, .windsurf) are deliberately excluded from auto-sync since consumers customize them — only canon docs that LumenFlow fully owns.
