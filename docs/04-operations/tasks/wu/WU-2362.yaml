description: 'WU-2359 softened spawn provenance to warn-only when no delegation registry entry
  exists. But delegation recording is best-effort (wu-spawn-helpers.ts:283) and state is
  checkout-rooted, so a legitimately delegated WU can arrive at wu:done with no registry entry
  through normal workflow. Fix: (1) wu:delegate writes a durable delegation-intent marker (e.g.
  wu-events.jsonl lifecycle event, not ad-hoc YAML field), (2) wu:delegate fails if it cannot record
  that marker, (3) wu:done interprets: no marker = non-orchestrated (warn), marker present but
  registry/pickup missing = hard-block, full chain = pass.'
acceptance:
  - wu:delegate writes a durable delegation-intent lifecycle event to wu-events.jsonl
  - wu:delegate fails (non-zero exit) if it cannot write the delegation-intent event
  - wu:done warns-only when no delegation marker AND no registry entry (non-orchestrated)
  - wu:done hard-blocks when delegation-intent event exists but registry pickup/attestation is
    missing
  - wu:done passes when full delegation chain is present (intent + registry + pickup + attestation)
