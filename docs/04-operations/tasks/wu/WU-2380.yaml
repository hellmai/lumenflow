description: 'Context: LumenFlow already enforces schema-to-migration co-change, but it does not
  verify that pending migrations have actually been applied in manual-deploy workflows. Problem:
  projects can merge code plus migration files and still ship runtime breakage because wu:prep/gates
  never run a project-defined migration-state check against the intended database target. Solution:
  add an optional, config-driven migration-state verification hook for schema-affecting WUs so
  gates/wu:prep can run a project-supplied verification command when DB-related files change, fail
  with actionable guidance when the check fails, and stay inert when the feature is not configured.'
acceptance:
  - Workspace config can optionally declare a migration-state verification command plus trigger
    patterns or equivalent scope for schema-affecting work without breaking existing repos by
    default
  - When configured and a WU touches matching schema or migration paths, gates and wu:prep run the
    verification check and fail with actionable guidance if migration state is not up to date
  - When the check is not configured or the WU does not touch DB-affecting paths, existing co-change
    behavior remains unchanged and no migration-state command runs
  - 'Documentation makes the boundary explicit: this is a manual-deploy safety net for
    project-defined verification, not an automatic production migration runner'
  - Internal agent docs and Starlight docs explain when migration-state verification runs, what it
    checks, and how agents should respond when it fails
