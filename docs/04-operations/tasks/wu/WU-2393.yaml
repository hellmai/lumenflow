description: Agents cannot safely add/remove/modify co-change gate rules because config:set only
  handles scalars. The only option today is raw YAML editing, violating Constraint 9. Add a
  dedicated gate:co-change command following the lane:edit pattern with --add, --remove, --edit,
  --list operations. Micro-worktree isolated, schema-validated, glob-syntax checked.
acceptance:
  - gate:co-change --add creates a new co-change rule with --name, --trigger, --require, --severity,
    --guidance flags
  - gate:co-change --remove deletes a rule by --name, errors on built-in rule names
  - gate:co-change --edit merges specified flags into existing rule (overwrite semantics for arrays)
  - gate:co-change --list shows merged view of built-in and custom rules with labels
  - Glob syntax validation on --trigger and --require patterns
  - Duplicate name detection on --add, unknown name error on --edit and --remove
  - Registered in public-manifest.ts, docs:generate produces correct output
  - 'Doc parity: quick-ref-commands.md and templates updated'
