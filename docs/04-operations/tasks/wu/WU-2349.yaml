description: When initiative:plan --plan <path> is given an external file path, it sets a lumenflow:// URI but does not copy the file into the repo plansDir. Agents cannot find the plan. The command should detect local file paths, copy them into the project-configured plansDir, and set a repo-relative URI.
acceptance:
  - initiative:plan --plan <external-path> copies file into plansDir from workspace.yaml
  - related_plan URI uses repo-relative path, not lumenflow:// external URI
  - --create with --plan uses file content instead of blank template
  - Existing lumenflow:// URI behaviour preserved when no local file given
  - Internal docs and Starlight docs updated for new behaviour
