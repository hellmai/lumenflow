description: 'Context: An agent in lumenflow-cloud ran plan:create --id WU-645 --from <path> which reported success. However, no commit was created and no plan file appeared in the repo. git pull --ff-only confirmed main was already up to date with no new commits. The micro-worktree appears to have been created and cleaned up, but the commit/push step failed silently. Problem: plan:create uses micro-worktree isolation to atomically commit plan files. When the internal commit or push fails, the command still exits 0 and prints a success message. The agent then proceeded with plan:link against the non-existent file, cascading into a chain of workarounds. Solution: plan:create must verify the commit landed on the target branch before reporting success. If the micro-worktree commit or push fails, the command must exit non-zero and surface the underlying git error.'
acceptance:
  - plan:create exits non-zero when micro-worktree commit/push fails
  - plan:create surfaces the underlying git error message on failure
  - plan:create verifies the committed file exists on the target branch before reporting success
