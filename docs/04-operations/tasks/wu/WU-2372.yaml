description: "Context: Spawned sub-agents (general-purpose, test-engineer, etc.) routinely fail to discover canonical LumenFlow commands before attempting them. Observed failures include: (1) using nonexistent commands like 'pnpm wu:show', (2) using blocked shell commands like 'find' despite hook enforcement, (3) truncating authoritative CLI output with 'head'/'tail' pipes (e.g., 'pnpm lumenflow:commands | head -5'), losing critical information. Problem: The existing block-bash-file-commands.sh hook correctly blocks 'head file' and 'tail file' but allows 'pnpm some-command | head' because piped usage is whitelisted. Spawned agent prompts (general-purpose.md, etc.) mention reading LUMENFLOW.md but do not mandate running 'pnpm lumenflow:commands' before attempting any CLI operation, nor do they warn against truncating CLI output. Solution: (1) Add a hook rule to block 'head'/'tail' when piped from 'pnpm' commands (CLI output truncation). (2) Add mandatory command-discovery step to agent prompt templates requiring 'pnpm lumenflow:commands' or '--help' before first CLI usage. (3) Add hook detection for common nonexistent command patterns to provide corrective guidance."
acceptance:
  - block-bash-file-commands.sh blocks 'pnpm <cmd> | head' and 'pnpm <cmd> | tail' patterns with guidance to read full output
  - general-purpose.md agent prompt includes mandatory command discovery step before first CLI usage
  - All agent prompts in .claude/agents/ include warning against truncating CLI output
  - Hook provides corrective suggestion when agent attempts known-nonexistent commands (wu:show, wu:list, etc.)
  - Existing piped head/tail for non-pnpm commands remains allowed
