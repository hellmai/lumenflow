description: "Context: Spawned sub-agents routinely fail to discover canonical LumenFlow commands
  before attempting them. Observed failures include: (1) using nonexistent commands like 'pnpm
  wu:show', (2) truncating authoritative CLI output with 'head'/'tail' pipes, losing critical
  information. Problem: AGENTS.md already has the three mandatory rules (command discovery,
  help-first, no truncation) but spawned agent prompts don't reference AGENTS.md or enforce these
  rules. The general-purpose.md agent reads LUMENFLOW.md and constraints.md but skips AGENTS.md
  where the command discovery rules live. Solution: Update all vendor-specific agent prompts and
  rules to (1) mandate reading AGENTS.md as part of automatic context loading, (2) include the three
  command discovery rules inline or by reference, (3) warn against guessing commands or truncating
  CLI output. No hook changes — guidance only."
acceptance:
  - All agent prompts in .claude/agents/ include AGENTS.md in their automatic context loading
    sequence
  - All agent prompts include the three command discovery rules (lumenflow:commands first, --help
    before use, never truncate)
  - .windsurf/rules/lumenflow.md and .cursor/rules/lumenflow.md reference AGENTS.md command
    discovery rules
  - No hook changes - enforcement is guidance-only across all vendor configs
