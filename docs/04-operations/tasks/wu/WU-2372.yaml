notes: "Root cause analysis from WU-2366 review: spawned agents exhibit three failure modes that
  hooks and prompts don't prevent. The block-bash-file-commands.sh hook whitelists all piped
  head/tail (line 246: pipe check exits 0), which means CLI output truncation passes silently. Agent
  prompts load LUMENFLOW.md context but never enforce running lumenflow:commands as a discovery
  step. Consider adding a known-commands registry to the hook for typo detection."
