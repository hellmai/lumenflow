description: "Context: Spawned sub-agents routinely fail to discover canonical LumenFlow commands
  before attempting them. Observed failures include: (1) using nonexistent commands like 'pnpm
  wu:show', (2) using blocked shell commands like 'find' despite hook enforcement, (3) truncating
  authoritative CLI output with 'head'/'tail' pipes (e.g., 'pnpm lumenflow:commands | head -5'),
  losing critical information. Problem: AGENTS.md already has the three mandatory rules (command
  discovery, help-first, no truncation) but spawned agent prompts don't reference AGENTS.md or
  enforce these rules. The block-bash-file-commands.sh hook correctly blocks 'head file' and 'tail
  file' but allows 'pnpm some-command | head' because piped usage is whitelisted. Solution: (1)
  Update all vendor-specific agent prompts (.claude/agents/, .windsurf/rules/, .cursor/rules/) to
  mandate AGENTS.md reading and command discovery before first CLI usage. (2) Add hook enforcement
  for pnpm pipe truncation in Claude Code hooks (vendor-specific enforcement layer). (3) Add hook
  detection for common nonexistent command patterns. This follows the existing architecture:
  AGENTS.md is the vendor-agnostic source of truth, vendor-specific configs reference it, hooks
  enforce at the tool level."
acceptance:
  - block-bash-file-commands.sh blocks 'pnpm <cmd> | head' and 'pnpm <cmd> | tail' patterns with
    guidance to read full output
  - general-purpose.md agent prompt includes mandatory command discovery step before first CLI usage
  - All agent prompts in .claude/agents/ include warning against truncating CLI output
  - Hook provides corrective suggestion when agent attempts known-nonexistent commands (wu:show,
    wu:list, etc.)
  - Existing piped head/tail for non-pnpm commands remains allowed
