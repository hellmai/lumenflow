description: 'wu:done shells out to pnpm prettier write to format generated files including WU YAML specs. Prettier exits 0 without formatting yaml files when no YAML parser is available. This silently produces unformatted YAML committed to main, causing consumer CI format check gates to fail. Fix: format WU YAML programmatically using js-yaml in wu-done-metadata.ts.'
acceptance:
  - WU YAML files written by wu:done pass prettier --check in a consumer project that has no @prettier/plugin-yaml installed
  - Markdown files (backlog.md, status.md) continue to be formatted via pnpm prettier as before
