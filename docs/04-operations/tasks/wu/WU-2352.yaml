description: When wu:prep fails due to pre-existing gate failures, it exits before writing the checkpoint. wu:done --skip-gates then cannot authorize the session handoff because hasValidPrepCheckpoint is false, causing a spurious CLAIM OWNERSHIP VIOLATION. The --skip-gates flag should implicitly authorize the session handoff.
acceptance:
  - wu:done --skip-gates does not throw CLAIM OWNERSHIP VIOLATION when checkpoint is missing due to pre-existing wu:prep failure
  - Existing ownership protection still blocks unauthorized cross-session completions when --skip-gates is not used
  - Unit tests cover the skip-gates session handoff path
