description: >-
  Context: LumenFlow already has surface-aware testing guidance for UI, visual, and
  structured-content work, and wu:prep honors documented tdd-exception notes.

  Problem: wu:claim and related readiness/spec-completeness checks still push agents toward adding
  irrelevant automated-test paths for UI, docs, and dead-template cleanup work. This creates brittle
  tests, fake compliance in tests.unit, and hacks around the workflow instead of encouraging the
  right verification method for the task.

  Solution: Align claim/readiness/spec-completeness behavior with fit-for-surface verification so
  documented exceptions are honored consistently, UI/docs work are not forced into brittle TDD
  patterns, and the workflow explicitly prefers the best verification strategy for each task
  surface.
acceptance:
  - wu:claim and readiness checks no longer force unrelated automated test paths for UI, visual,
    documentation, or documented exception cases
  - Documented tdd-exception notes are honored consistently across claim/readiness/prep flows with
    auditable messaging
  - UI and smoke-test classified work are guided toward integration, smoke, and manual verification
    instead of brittle DOM-shape unit tests
  - Spec completeness guidance tells agents to choose fit-for-surface verification and not invent
    fake tests.unit entries
  - Regression tests cover claim validation, spec completeness, and prompt/constraint generation for
    UI and documented-exception cases
