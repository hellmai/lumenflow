description: wu:claim outputs '✅ wu:brief evidence auto-recorded (policy=auto; no handoff prompt generated)' which agents interpret as wu:brief being satisfied. The ✅ emoji and 'evidence auto-recorded' phrasing causes agents to skip running wu:brief explicitly, bypassing lane occupation checks, sizing validation, and handoff prompt generation.
acceptance:
  - wu:claim log message clearly communicates that wu:brief must still be run
  - Message uses warning emoji instead of success emoji
  - Test expectations updated
