description: >-
  Safe docs lifecycle: prevent user content destruction on upgrade and enable LumenFlow content
  injection on init.


  ## Design (confirmed by multi-agent analysis)


  ### File ownership model:

  - **LUMENFLOW.md** — fully LumenFlow-managed canonical workflow doc. Force-synced on upgrade.
  Users MUST NOT edit; use LUMENFLOW.local.md for project-specific additions.

  - **AGENTS.md** — thin universal bootstrap with critical operating rules + pointer to
  LUMENFLOW.md. Managed via merge-block markers.

  - **Vendor files** (CLAUDE.md, .cursor/rules/lumenflow.md, .windsurf/rules/lumenflow.md,
  .clinerules) — thin vendor-specific bootstrap + pointer to LUMENFLOW.md. Managed via merge-block
  markers.

  - **LUMENFLOW.local.md** — optional user-owned override file. Never touched by init or upgrade.
  Auto-included by convention.


  ### Upgrade behavior:

  - Force-sync LUMENFLOW.md (it is 100% LumenFlow-managed)

  - Merge-block update bootstrap files (replace content between LUMENFLOW:START/END markers only)

  - Never touch user content outside markers


  ### Init behavior:

  - File missing → create from template (current behavior, unchanged)

  - File exists → inject/update merge-block with bootstrap content, preserve everything else


  ### Skills policy:

  - Reserved LumenFlow skill names (wu-lifecycle, worktree-discipline, lumenflow-gates,
  tdd-workflow) → managed and updatable on upgrade

  - User-created skills outside reserved names → never touched


  ## Bugs fixed:

  1. upgrade calls executeDocsSyncInDir with force:true (lumenflow-upgrade.ts:557) — blitzes
  AGENTS.md, constraints.md, onboarding docs, skills

  2. init skip mode leaves LumenFlow content uninjected when vendor files already exist
acceptance:
  - LUMENFLOW.md is force-synced on upgrade without data loss (it is fully LumenFlow-managed)
  - LUMENFLOW.local.md supported as user override file, documented in LUMENFLOW.md header
  - AGENTS.md uses merge-block markers; user content outside markers preserved on upgrade
  - All vendor bootstrap files use merge-block markers; user content preserved on upgrade
  - init into existing project injects merge-block into existing bootstrap files
  - Reserved LumenFlow skills updatable on upgrade; user-created skills never touched
  - 'Round-trip test: init → user edits outside markers → upgrade → user edits preserved'
  - 'Codex/dumb-agent test: AGENTS.md bootstrap contains enough inline instruction without requiring
    reference-following'
