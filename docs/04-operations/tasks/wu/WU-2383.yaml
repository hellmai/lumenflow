description: |-
  Two related bugs in docs lifecycle:

  1. **upgrade blitzes user content**: lumenflow-upgrade.ts calls executeDocsSyncInDir with force:true (line 557), which unconditionally overwrites LUMENFLOW.md, AGENTS.md, .lumenflow/constraints.md, onboarding docs, and .claude/skills/*/SKILL.md via raw writeFileSync. Any user customizations to these files are destroyed.

  2. **init skip leaves gap**: When a project already has CLAUDE.md, AGENTS.md, etc., init defaults to skip mode — preserving user files but never injecting LumenFlow-managed content. The user gets no LumenFlow instructions in their existing files.

  Both problems affect all vendor surfaces: Claude, Cursor, Windsurf, Cline, Codex. AGENTS.md is the universal entry point read by all agents.
acceptance:
  - upgrade never overwrites user content outside bounded markers
  - init into existing project injects LumenFlow block into existing vendor files
  - merge-block pattern (LUMENFLOW:START/END markers) used for all synced docs
  - existing merge-block.ts logic extended to cover LUMENFLOW.md, AGENTS.md, constraints.md, skills, and all vendor rule files
  - upgrade replaces only content between markers, preserving user content
  - 'round-trip test: init -> user edits outside markers -> upgrade -> user edits preserved'
