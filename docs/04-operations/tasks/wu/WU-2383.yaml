notes: >-
  Merge-block pattern already exists in merge-block.ts for .gitignore. Extend to AGENTS.md and
  vendor bootstrap files only — NOT to LUMENFLOW.md (which is fully managed). Key insight from
  Codex: link-only files are too weak for agents that dont follow references. Bootstrap files need
  enough inline content to be useful standalone. The LUMENFLOW.local.md escape hatch prevents moving
  the overwrite problem from vendor files to LUMENFLOW.md.


  Codex review additions: (1) .local.md must be referenced from managed files so agents discover it.
  (2) AGENTS.md managed block must be self-sufficient for dumb agents. (3) Upgrade must be
  vendor-agnostic — only sync surfaces that exist/are configured, not hardcode claude. (4) Skills
  allowlist must be exact, not glob. (5) First-time migration guard is critical — repos that
  hand-edited LUMENFLOW.md before this change need drift detection + forced migration to .local.md
  before we start force-syncing. Without this, the first upgrade under the new design still causes
  data loss.


  Doc scope (mandatory, same WU — changes user contract):


  TEMPLATES (become generated files in consumer repos):

  - LUMENFLOW.md.template

  - AGENTS.md.template

  - UPGRADING.md.template

  - quick-ref-commands.md.template

  - vendor-support.md.template (if exists)

  - starting-prompt.md.template

  - release-process.md.template


  STARLIGHT DOCS (user-facing):

  - upgrade.mdx

  - agent-onboarding.mdx

  - ai-integrations-setup.mdx

  - ai-agent-integration.mdx

  - reference/templates.mdx (LUMENFLOW.local.md override story)


  DOGFOOD DOCS (this repo):

  - AGENTS.md, LUMENFLOW.md, CLAUDE.md

  - START-HERE.md, README.md if they reference old behavior


  STALE REFERENCES (30+ hits for docs:sync --force):

  - quick-ref-commands.md line 109: still says docs:sync --force refreshes after upgrade

  - upgrade.mdx line 26: still tells users to run docs:sync --force

  - UPGRADING.md.template line 15: same old flow

  - Plus 27 more references across templates, Starlight, onboarding, tests, CLI README


  Only touch docs that describe: (1) who owns LUMENFLOW.md vs .local, (2) what init does when files
  exist, (3) what upgrade/docs:sync may rewrite, (4) what bootstrap content must remain inline for
  dumb agents.
