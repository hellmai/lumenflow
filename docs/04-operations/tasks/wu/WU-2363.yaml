description: Agents are over-splitting cohesive work into tiny WUs because the sizing guidance still over-emphasizes decomposition in some copies. Update the canonical sizing guide, the onboarding summary, and upgrade/scaffold templates to bias strongly toward one coherent outcome per WU, add explicit anti-patterns, and align all surfaces. Remove the legacy inline WU sizing template from init-templates.ts to eliminate drift.
acceptance:
  - Canonical sizing guidance explicitly prioritizes cohesion over heuristic-driven splitting and includes anti-pattern examples for over-splitting
  - Onboarding and upgrade template copies are aligned so existing projects refreshed via docs:sync receive the same guidance
  - Legacy inline WU sizing template is removed so only the maintained template path remains
  - Tests updated as needed for scaffolded onboarding docs after removing the legacy inline template
