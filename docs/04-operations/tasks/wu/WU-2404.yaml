description: resolvePackManifestPaths() in pack-manifest-resolver.ts silently returns an empty map when pack manifests are not at the expected monorepo disk path. In consumer projects installed via npm, the SD pack manifest lives under node_modules but the resolver only checks the monorepo layout for source:local packs without an explicit path field. This causes config:set to reject software_delivery as an unknown root key with empty pack config_key list.
acceptance:
  - resolvePackManifestPaths finds pack manifests for all source types in consumer installs
  - config:set software_delivery keys work in simulated consumer layout
  - Existing monorepo resolution path unchanged
  - Tests cover registry source, local source without path, and missing manifest graceful skip
