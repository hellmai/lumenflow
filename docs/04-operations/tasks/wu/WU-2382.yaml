description: 'Context: wu:edit supports repeatable flags for paths, IDs, risks, manual tests, and
  other WU fields. Problem: applyEdits() currently splits all repeatable field values on commas,
  which fragments free-text entries like manual test descriptions and risks into multiple YAML items
  whenever prose contains commas. Solution: limit comma-splitting to path and ID style fields,
  preserve free-text repeatable fields as literal strings, and add regression coverage so manual
  test descriptions, risks, and similar prose remain intact while shorthand comma-separated path or
  dependency input still works.'
acceptance:
  - wu:edit preserves free-text repeatable fields such as manual test descriptions and risks as
    single entries even when the text contains commas
  - Path and ID style repeatable fields that intentionally support comma-separated shorthand
    continue to work as before
  - Regression tests cover both preserved prose fields and supported comma-split path or WU-ID fields
