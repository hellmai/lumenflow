description: Spawn prompts (wu:brief and orchestration) reference files that do not exist in
  consumer projects. (1) The completeGuidePath default in docs-layout-presets.ts points to
  docs/_frameworks/lumenflow/lumenflow-complete.md, which is not scaffolded by lumenflow init or
  docs:sync — onboarding-template-paths.ts only scaffolds onboarding docs. Even
  lumenflow-agent-capsule.md (which LUMENFLOW.md.template now references) is not scaffolded either.
  The prompt preamble step 4 sends agents to read a nonexistent file. (2)
  spawn-constraints-generator.ts and spawn-task-builder.ts emit node
  packages/@lumenflow/agent/verification which is a monorepo-only path. wu:brief already uses pnpm
  wu:verify — orchestration/core prompts must be unified to match. Fix both by either scaffolding
  the referenced doc or changing prompts to reference a doc that actually exists, and unifying
  verification to pnpm wu:verify.
acceptance:
  - Preamble step 4 references a file that exists in consumer projects after lumenflow init
  - Verification instructions in spawn-constraints-generator.ts and spawn-task-builder.ts use pnpm
    wu:verify, matching wu:brief
  - Existing tests in spawn-strategy.test.ts and initiative-orchestrator.test.ts updated to match
    new paths
