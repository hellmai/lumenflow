description: 'Context: WU-2329 made wu:brief verification guidance template-driven and lane-aware, but the consumer-facing docs still describe the older override surface and do not clearly explain defaults, upgrade behavior, or what new installs get automatically. Problem: users can benefit from the new defaults immediately, but they cannot discover the new built-in sections, condition variables, tokens, or the recommended upgrade path from the docs alone. Solution: update the public customization/reference/upgrade docs and the framework onboarding docs so consumers understand default behavior, when .lumenflow/templates is optional, how to upgrade existing repos, and how to override the new verification/design sections.'
acceptance:
  - Upgrade docs explain what existing installs should run after upgrading and clarify that default behavior works without project-local template overrides.
  - Customization/reference docs list the new built-in verification/design template IDs plus the new template condition variables and tokens introduced for wu:brief composition.
  - Onboarding/framework docs explain how new installs, upgraded installs, and custom template overrides relate to each other without implying consumers must scaffold .lumenflow/templates just to use the defaults.
  - Examples and wording stay consistent across public docs and internal onboarding docs.
