description: orchestrate:initiative hardcodes claude-code strategy in formatting.ts
  (generateEmbeddedSpawnPrompt and formatExecutionPlanWithEmbeddedSpawns) and has no --client
  parameter. wu:brief already handles client-specific output — Codex gets markdown, Claude gets Task
  XML — via wu-spawn-strategy-resolver.ts. But orchestration always emits Claude-style Task XML
  regardless of which agent platform will consume it. The default fallback in
  wu-spawn-strategy-resolver.ts is also Claude. Add --client to orchestrate:initiative, pass client
  strategy through formatting.ts instead of hardcoding SpawnStrategyFactory.create claude-code, and
  choose output format by client capability (XML invocation for Claude, markdown prompt for
  Codex/Gemini). This makes orchestration vendor-agnostic, consistent with the rest of the spawn
  pipeline.
acceptance:
  - orchestrate:initiative accepts --client parameter (claude-code, codex-cli, gemini-cli)
  - formatting.ts passes client strategy through instead of hardcoding claude-code
  - 'Output format varies by client capability: Task XML for Claude, markdown for Codex/Gemini'
  - Default fallback when --client is omitted produces a generic format usable by any client
initiative: INIT-50
