notes: 'Follows two-layer model: LUMENFLOW.md is canon for shared workflow, AGENTS.md is universal bootstrap, vendor files are deltas only. Related to WU-2363 (sizing guidance consolidation). head/tail rule is scoped: never truncate lumenflow:commands, --help, or error output — not a blanket ban.'
