description: LUMENFLOW.md is the canonical vendor-agnostic entry point but buries command discovery
  (line 260) and help-first (line 135). CLAUDE.md, .cursor/rules, .windsurf/rules duplicate Quick
  Start, Core Principles, and command tables from LUMENFLOW.md, causing drift. Add a Before You
  Begin section to LUMENFLOW.md with three mandatory startup rules (lumenflow:commands first, --help
  before first use, never truncate discovery/help/error output). Add short First Session bootstrap
  to AGENTS.md. Strip duplicated workflow from vendor overlays, replacing with pointer to
  LUMENFLOW.md plus vendor-specific deltas only. Update all corresponding .template files.
acceptance:
  - LUMENFLOW.md has a Before You Begin section before Quick Start with the three startup rules
  - AGENTS.md has a First Session bootstrap block pointing agents to LUMENFLOW.md
  - CLAUDE.md contains only Claude-specific deltas (hooks, skills, slash commands) plus pointer to
    LUMENFLOW.md — no duplicated Quick Start, Core Principles, or command tables
  - 'Vendor overlay files (.cursor/rules, .windsurf/rules) follow same pattern: pointer to
    LUMENFLOW.md plus vendor-specific deltas only'
  - All corresponding .template files updated in packages/@lumenflow/cli/templates/
  - No net-new workflow guidance — all shared rules consolidated into LUMENFLOW.md
  - 'tool-usage.md updated: head/tail exception for command output explicitly excludes
    lumenflow:commands, --help output, and CLI error/fix output'
