description: 'Context: config:set uses micro-worktree isolation and always commits/pushes to main
  atomically. Problem: When an agent runs config:set mid-WU from inside a worktree, the
  workspace.yaml change leaks to main before wu:done merges the WU branch. This breaks isolation —
  the change should travel with the branch. Solution: Detect if config:set is running inside a git
  worktree (using git rev-parse --show-toplevel / git worktree list, not brittle string matching).
  If inside a worktree, commit to the worktree branch instead of creating a micro-worktree to main.
  If on main, keep current micro-worktree behaviour.'
acceptance:
  - config:set detects worktree using git commands (git rev-parse), not path string matching
  - When run from a worktree, config:set commits the change to the worktree branch
  - When run from main checkout, config:set uses existing micro-worktree-to-main behaviour unchanged
  - Existing worktree detection patterns in the codebase are reused (no new detection logic)
