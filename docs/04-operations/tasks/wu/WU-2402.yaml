description: 'Code review found two test configuration issues: (1) workspace.yaml specifies 90% minimum coverage but vitest.config.ts enforces 80% — these should be aligned to one number; (2) passWithNoTests:true in vitest.config.ts allows packages with zero tests to pass CI silently, which is how the metrics and runtime test gaps went unnoticed. Fixing passWithNoTests may require adding placeholder tests or adjusting the include patterns.'
acceptance:
  - Coverage threshold is consistent between workspace.yaml and vitest.config.ts
  - passWithNoTests is disabled or scoped to only explicitly exempt packages
  - CI passes with the updated config
