description: 'Context: LumenFlow still carries implicit Next.js and apps/web assumptions in work classification and onboarding guidance, while the broader portability contract remains undocumented. Problem: non-web or non-Next.js consumer repos can receive misleading UI/domain hints and dashboard instructions, and there is no explicit baseline matrix describing what tech-stack portability currently means. Solution: narrow framework-specific heuristics to optional signals, make onboarding guidance conditional on detected/configured dashboard support, and publish the explicit portability boundary plus supported archetype matrix.'
acceptance:
  - work-classifier no longer treats Next.js/app-router conventions as the default truth for UI guidance without corroborating signals or configuration
  - Onboarding and generated guidance mention apps/web or dashboard startup only when the workspace shape or config indicates a dashboard is present
  - Documentation publishes the portability boundary and supported archetype matrix, with smoke verification guidance for the baseline archetypes
