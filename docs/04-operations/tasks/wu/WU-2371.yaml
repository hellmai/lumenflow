description: >-
  ## Context

  WU-2366 added core-doc refresh to docs:sync --force and a post-upgrade staleness warning. Four
  bugs shipped with it.


  ## Problem

  1. **syncCoreDocs() renders with {DATE} only** — core templates require QUICK_REF_LINK,
  DOCS_ONBOARDING_PATH, DOCS_OPERATIONS_PATH, DOCS_TASKS_PATH. Result: docs:sync --force writes
  unresolved {{...}} placeholders.

  2. **checkDocsStaleness() false-positives daily** — hashes templates rendered with today's date,
  so docs synced yesterday always appear stale. Also uses the wrong (incomplete) token set.

  3. **docs:sync --help text is stale** — parser says "onboarding docs and vendor assets" but
  manifest says "core docs, onboarding docs, and vendor assets".

  4. **Broken relative links in .claude/CLAUDE.md** — links to docs/ and .lumenflow/ missing ../
  prefix since file lives in .claude/ subdirectory.


  ## Solution

  1. Share init.ts token resolution (docsPaths) into syncCoreDocs so all tokens are rendered.

  2. Fix checkDocsStaleness to either strip DATE before hashing or use the on-disk date. Also use
  the full token set.

  3. Update parser help string to match manifest.

  4. Fix relative links in .claude/CLAUDE.md (and its template if applicable).
acceptance:
  - docs:sync --force renders all tokens in AGENTS.md, LUMENFLOW.md, constraints.md — no unresolved
    {{...}} placeholders
  - checkDocsStaleness returns false for docs synced yesterday (date-invariant comparison)
  - pnpm docs:sync --help output matches public-manifest.ts description
  - All relative links in .claude/CLAUDE.md resolve correctly from the .claude/ directory
