description: Setting an initiative phase status to an invalid enum value (e.g. 'ready') causes the
  CLI initiative loader to silently drop the entire initiative from initiative:list and
  initiative:status. No error or warning is shown. The loader should reject invalid phase statuses
  with an error or warning instead of silently omitting the initiative.
acceptance:
  - Invalid phase status values produce a clear error or warning message
  - Initiative with one invalid phase status is not silently dropped from initiative:list
