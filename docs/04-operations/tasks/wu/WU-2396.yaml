description: WU-2395 excluded WU YAML from stageAndFormatMetadata based on an incorrect assumption that Prettier may silently skip YAML. In practice, writeWU yaml.stringify output does not match consumer prettier --check output, so wu:done can still commit metadata files that fail format gates. Fix wu:done metadata formatting to run the repo's Prettier against generated YAML and markdown from the correct repo root, and fail completion if Prettier check still reports differences.
acceptance:
  - wu:done formats generated WU and initiative YAML files with the consumer project's Prettier so they pass prettier --check immediately after completion
  - wu:done verifies generated metadata formatting before commit and aborts instead of committing files that still fail Prettier check
