description: 'Context: wu:claim with policyMode=auto (the default) auto-records claim-auto evidence in wu-events.jsonl. Problem: wu:done-policies.ts checks whether wu:brief evidence EXISTS but never checks the evidence mode. claim-auto evidence satisfies the gate, so agents can complete WUs without ever running wu:brief. This bypasses the entire purpose of wu:brief — lane occupation checks, sizing validation, memory context, and the structured handoff prompt with context-loading instructions. Agents (including Codex) have been observed skipping wu:brief entirely because the gate is pre-satisfied. Solution: 1) wu:done-policies.ts must reject claim-auto evidence and require full/prompt mode evidence. 2) Document this behavior clearly in Starlight docs and agent onboarding so all agents understand wu:brief is mandatory. 3) Update AGENTS.md/LUMENFLOW.md to make wu:brief requirement explicit.'
acceptance:
  - wu:done rejects claim-auto evidence mode and requires full or prompt mode evidence from explicit wu:brief run
  - wu:prep warns when only claim-auto evidence exists with actionable remediation
  - Agent onboarding docs (starting-prompt.md, quick-ref-commands.md) clearly state wu:brief is mandatory after wu:claim
  - Starlight docs (wu-brief concept page or lifecycle page) document the evidence modes and why claim-auto is insufficient
  - AGENTS.md and/or LUMENFLOW.md updated to make wu:brief requirement unambiguous
