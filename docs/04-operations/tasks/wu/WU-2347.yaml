description: 'Context: wu:done writes .lumenflow/skip-gates-audit.ndjson to the worktree on each
  --skip-gates attempt. Problem: If wu:done fails after writing the audit file (e.g. main behind,
  rebase conflict), the next attempt fails with uncommitted changes because the audit file is dirty.
  This creates a Sisyphean loop where each attempt dirties the worktree, blocking the next.
  Additionally, prettier has no parser for .ndjson so format:check also fails. Solution: (1) wu:done
  should auto-stage skip-gates-audit.ndjson before the dirty-check or write it as part of the atomic
  transaction. (2) The .prettierignore template should include .ndjson.'
acceptance:
  - wu:done --skip-gates does not leave uncommitted skip-gates-audit.ndjson blocking retries
  - format:check does not fail on .ndjson files (prettierignore covers them)
  - 'Retry loop: wu:done fails then retry succeeds without manual git add/commit'
