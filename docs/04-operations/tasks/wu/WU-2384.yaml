description: >-
  Follow-up to WU-2383 (safe docs lifecycle). WU-2383 ships the code fix + scaffold contract. This
  WU sweeps all narrative docs to match the new ownership model.


  ## Scope


  1. **Starlight pages**: upgrade.mdx, upgrading.mdx, agent-onboarding.mdx,
  ai-integrations-setup.mdx, ai-agent-integration.mdx, templates.mdx

  2. **Dogfood/root docs**: AGENTS.md, LUMENFLOW.md, CLAUDE.md, START-HERE.md, README.md

  3. **Stale docs:sync --force references**: 30+ hits across templates, Starlight, onboarding, CLI
  README, release notes (see WU-2383 notes for full grep)

  4. **Ownership table**: canonical table in LUMENFLOW.md (who owns what, what init/upgrade may
  touch), mirrored in Starlight upgrade and setup docs

  5. **LUMENFLOW.local.md documentation**: reference in Starlight and onboarding for the override
  story


  ## Out of scope (stays in WU-2383)

  - Code changes to init, docs-sync, upgrade, merge-block

  - Migration guard implementation

  - Reserved skills allowlist

  - Templates the CLI directly emits (LUMENFLOW.md.template, AGENTS.md.template,
  UPGRADING.md.template, quick-ref-commands.md.template, starting-prompt.md.template)

  - Tests
acceptance:
  - Starlight upgrade.mdx and upgrading.mdx updated to reflect new safe upgrade behavior
  - Starlight agent-onboarding and ai-integrations-setup pages updated with ownership model
  - Starlight templates.mdx documents LUMENFLOW.local.md override story
  - Dogfood docs (AGENTS.md, LUMENFLOW.md, CLAUDE.md) match new ownership model
  - All 30+ stale docs:sync --force references updated or removed
  - Canonical ownership table present in LUMENFLOW.md and mirrored in Starlight upgrade docs
  - No narrative doc still tells users to run docs:sync --force to refresh vendor assets after
