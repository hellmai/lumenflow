description: docs:sync writes files directly to cwd on main branch. The branch guard (WU-1362) only warns but doesn't block. Should use micro-worktree isolation like wu:create, wu:claim, and release do. Additionally, lumenflow:upgrade should run docs:sync as part of its own micro-worktree transaction instead of telling the user to run it separately.
acceptance:
  - docs:sync uses micro-worktree isolation when run on main branch
  - docs:sync commits and pushes atomically like other micro-worktree commands
  - lumenflow:upgrade integrates docs:sync into its own transaction instead of requiring a separate manual step
  - Existing worktree behavior preserved (docs:sync in a worktree writes directly as before)
