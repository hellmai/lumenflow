description: Lane-health uses fast-glob to enumerate files but does not replicate git's gitignore
  semantics for unanchored directory patterns. Git treats 'node_modules/' as '**/node_modules/'
  (recursive match), but fast-glob only matches at the level where the .gitignore lives. This causes
  false-positive 'uncovered files' for any nested ignored directory (node_modules, vendor, build,
  dist, __pycache__, .gradle, etc). The fix should normalize unanchored directory patterns by
  prepending **/ before passing them to fast-glob.
acceptance:
  - Unanchored directory patterns in .gitignore (e.g. node_modules/, vendor/, __pycache__/) are
    treated as recursive by lane-health, matching git behavior
  - Anchored patterns (starting with /) remain scoped to their .gitignore location
  - Patterns already prefixed with **/ are not double-prefixed
  - Unit tests cover unanchored, anchored, and already-prefixed patterns
