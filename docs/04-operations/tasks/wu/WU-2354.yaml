description: initiative:edit does not support phase_execution_order or dependency_model fields.
  Agents attempting to update these fields must use raw file edits which don't persist through
  micro-worktree isolation. Add --phase-execution-order and --dependency-model flags to
  initiative:edit so these fields can be updated via the safe push-only micro-worktree path.
acceptance:
  - initiative:edit --id INIT-XXX --phase-execution-order sequential updates the field and persists
    to origin/main
  - initiative:edit --id INIT-XXX --dependency-model value updates the field and persists to
    origin/main
  - Invalid values are rejected with helpful error messages
  - CLI reference docs and Starlight docs updated to reflect new flags
  - Unit tests cover both new flags
